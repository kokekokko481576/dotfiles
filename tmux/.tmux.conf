# --- Vim-like operations ---
# Move between panes with Vim keybindings
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keybindings
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- General Settings ---
# Enable mouse support
set -g mouse on

# Support 256 colors and TrueColor
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer size
set -g history-limit 50000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Reduce escape-time for faster Vim response
set -s escape-time 0

# Vi mode for copy mode
setw -g mode-keys vi

# Open new panes in the current directory
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'

# Reload config file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- Copy Mode Settings ---
# 'v' to begin selection
bind -T copy-mode-vi v send -X begin-selection

# 'y' to yank (macOS: pbcopy / Linux: xclip)
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# 'V' for line selection
bind -T copy-mode-vi V send -X select-line

# 'C-v' for rectangle toggle
bind -T copy-mode-vi C-v send -X rectangle-toggle

# 'C-p' to paste
bind-key C-p paste-buffer

# --- Layout Presets ---
# 【Shift + d】 Development layout
bind D split-window -h -p 35 \; split-window -v \; select-pane -L

# 【Shift + m】 Monitoring layout
bind M split-window -h \; split-window -v \; select-pane -L \; split-window -v \; select-layout tiled

# --- TPM (Tmux Plugin Manager) ---
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux'

# Dracula theme settings
set -g @dracula-show-powerline true
set -g @dracula-plugins "weather cpu-usage ram-usage time"
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-military-time true

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
