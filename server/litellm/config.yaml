model_list:
  - model_name: gemini-2.5-flash-vertex
    litellm_params:
      model: vertex_ai/gemini-2.5-flash
      vertex_project: uoo-ship-project
      vertex_location: us-central1
  - model_name: gemini-2.5-pro-vertex
    litellm_params:
      model: vertex_ai/gemini-2.5-pro
      vertex_project: uoo-ship-project
      vertex_location: us-central1

litellm_settings:
  drop_params: true
  # 429などで延々リトライして呼び出し側がタイムアウトするのを防ぐ。
  # 1回だけリトライして、ダメなら下のfallbacksへ即移る。
  num_retries: 1
  request_timeout: 30
  # flashが429(分間レート超過)になったら、別quotaのpro(Vertex)へ自動で切り替える。
  # ※AI Studio(gemini/)版はキーが枯渇済みのためフォールバック先に入れていない。
  fallbacks:
    - gemini-2.5-flash-vertex: ["gemini-2.5-pro-vertex"]
