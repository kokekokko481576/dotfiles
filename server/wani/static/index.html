<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3fa34d">
<title>ワニ博士</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="topbar">
    <h1>ワニ博士</h1>
    <div class="topbar-right">
      <span id="streak" class="streak" hidden>🔥 <b>0</b>日連続</span>
      <span id="mock-badge" class="badge" hidden>モック</span>
      <button id="add-task" class="add-btn" type="button" aria-label="タスク追加">＋</button>
    </div>
  </header>

  <nav class="mode-tabs" role="tablist">
    <button class="mode-tab" data-mode="adventure" role="tab">ぼうけん</button>
    <button class="mode-tab" data-mode="classic" role="tab">リスト</button>
    <button class="mode-tab" data-mode="map" role="tab">マップ</button>
  </nav>

  <div id="error-banner" class="error" hidden></div>

  <!-- ======== クラシック(リスト)モード ======== -->
  <div id="view-classic" hidden>
    <section class="stage-card">
      <canvas id="stage" width="32" height="32"></canvas>
      <div class="mood-row">
        <span id="mood-label" class="mood-label">…</span>
        <div class="meter"><div id="mood-bar" class="meter-fill"></div></div>
      </div>
      <p id="wani-say" class="say"></p>
    </section>

    <section class="progress-card">
      <div class="progress-head">
        <span>今日の進捗</span>
        <span id="progress-text">- / -</span>
      </div>
      <div class="meter big"><div id="progress-bar" class="meter-fill"></div></div>
    </section>

    <section id="task-list" class="tasks"></section>

    <details id="waiting-box" class="group" hidden>
      <summary>待ち（他人待ち・保留） <span id="waiting-count"></span></summary>
      <div id="waiting-list" class="tasks"></div>
    </details>

    <details id="wish-box" class="group" hidden>
      <summary>後回しBOX（wish list） <span id="wish-count"></span></summary>
      <div id="wish-list" class="tasks"></div>
    </details>
  </div>

  <!-- ======== アドベンチャーモード ======== -->
  <div id="view-adventure" hidden>
    <section class="adv-card">
      <div class="adv-hud">
        <span id="adv-stage">ステージ 1</span>
        <span id="adv-kills">討伐 0/0</span>
        <span id="adv-mood">気分 --</span>
      </div>
      <canvas id="adv-canvas" width="640" height="220"></canvas>
      <div id="adv-msg" class="adv-msg">▼</div>
      <div id="adv-side" class="adv-side"></div>
    </section>
  </div>

  <!-- ======== マップモード ======== -->
  <div id="view-map" hidden>
    <section class="map-card">
      <div class="progress-head" style="padding:0 4px 8px">
        <span>今日の道のり</span>
        <span id="map-progress">- / -</span>
      </div>
      <div id="map-root"></div>
    </section>
  </div>

  <footer class="foot">
    <span id="updated-at"></span>
    <button id="refresh" class="ghost-btn" type="button">更新</button>
  </footer>
</main>

<!-- タスク操作シート(ぼうけん/マップ共用) -->
<div id="sheet-backdrop" class="sheet-backdrop" hidden>
  <div id="task-sheet" class="task-sheet" role="dialog" aria-modal="true">
    <div id="sheet-title" class="sheet-title"></div>
    <div id="sheet-meta" class="task-meta"></div>
    <div id="sheet-actions" class="sheet-actions"></div>
    <div id="sheet-order" class="sheet-order"></div>
    <button id="sheet-close" class="ghost-btn" type="button">とじる</button>
  </div>
</div>

<!-- タスク追加オーバーレイ -->
<div id="add-backdrop" class="sheet-backdrop" hidden>
  <div class="task-sheet" role="dialog" aria-modal="true">
    <div class="sheet-title">あたらしいタスク</div>
    <input id="add-input" class="add-input" type="text" maxlength="200"
           placeholder="例: モータドライバの発注" autocomplete="off">
    <div class="sheet-actions">
      <button id="add-submit" class="status-btn active" type="button">追加する</button>
      <button id="add-cancel" class="status-btn" type="button">やめる</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
