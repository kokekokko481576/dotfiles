services:

  # ================================================================
  # Immich — 写真・動画管理（Google Photos 代替）
  # アクセス: http://kokko-server-pavilion:2283
  # ================================================================
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION:-/mnt/data/immich}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: redis
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - database
    restart: always
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  immich-microservices:
    container_name: immich_microservices
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    command: ["start.sh", "microservices"]
    volumes:
      - ${UPLOAD_LOCATION:-/mnt/data/immich}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    env_file: .env
    environment:
      DB_HOSTNAME: database
      DB_USERNAME: ${DB_USERNAME:-immich}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: redis
    depends_on:
      - redis
      - database
    restart: always
    mem_limit: 768m

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file: .env
    restart: always
    mem_limit: 1g
    # RAM節約のため、顔認識・CLIPが不要なら無効化してよい
    # profiles: ["ml"]

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    mem_limit: 128m

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:16-vectorchord0.4.1
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-immich}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --dbname='${DB_DATABASE_NAME:-immich}' --username='${DB_USERNAME:-immich}' || exit 1
      interval: 30s
      timeout: 10s
      start_period: 60s
    command: >
      postgres
      -c shared_preload_libraries=vchord.so
      -c search_path="$$user",public,vchord
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=256MB
      -c ssl=off
    restart: always
    mem_limit: 512m

  # ================================================================
  # Samba — ファイル共有（Linux / macOS / Windows からアクセス）
  # アクセス: smb://kokko-server-pavilion/data
  # ================================================================
  samba:
    container_name: samba
    image: ghcr.io/crazy-max/samba:latest
    ports:
      - "445:445"
    volumes:
      - /mnt/data:/data
      - ./samba/smb.conf:/etc/samba/smb.conf:ro
    environment:
      - TZ=Asia/Tokyo
      - SAMBA_PASSWORD=${SAMBA_PASSWORD}
    restart: always
    mem_limit: 128m

  # ================================================================
  # Navidrome — セルフホスト音楽ストリーミング（Spotify代替、広告なし・無料）
  # Subsonic API 互換。スマホは対応アプリ(Amperfy/play:Sub/Symfonium/DSub等)で、
  # PCはブラウザ内蔵プレイヤーで再生。Tailscale経由のみ到達可(ufwで外部遮断)。
  # アクセス: http://kokko-server-pavilion:4533
  # 音源の置き場所: Samba(smb://kokko-server-pavilion/data/music)に放り込むと自動スキャン。
  # ================================================================
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    ports:
      - "4533:4533"
    # 音源はSambaと同じ/mnt/data配下。Navidromeが誤って書き換えないよう読み取り専用。
    volumes:
      - ${MUSIC_LOCATION:-/mnt/data/music}:/music:ro
      - navidrome-data:/data
    environment:
      - TZ=Asia/Tokyo
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      # ファイル追加を1時間ごとに自動反映。すぐ反映したい時はWeb UIの管理画面から手動スキャン可。
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      # ジャケット画像はファイル埋め込み+フォルダ内画像から取得(外部APIに投げない)。
      - ND_COVERARTPRIORITY=cover.*, folder.*, front.*, embedded
      # モバイル回線用に低ビットレート再生(transcoding)を許可。ffmpeg同梱イメージなので追加不要。
      - ND_ENABLETRANSCODINGCONFIG=true
    restart: always
    # Go製で常時は軽い(~80MB)が、大規模ライブラリ初回スキャン時に一時的に増える。
    # 初回スキャンでOOMするようなら一時的に上げてよい(RAM事情はplan/09参照)。
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================================================
  # OpenWebUI — AIチャットUI（Gemini / Ollama 共通フロントエンド）
  # アクセス: http://kokko-server-pavilion:3000
  # ================================================================
  openwebui:
    container_name: openwebui
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      # Gemini API（OpenAI互換エンドポイント使用）
      - OPENAI_API_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/
      - OPENAI_API_KEY=${GEMINI_API_KEY}
      # ローカルLLM（同一サーバー上のOllama、CPU推論）
      - OLLAMA_BASE_URL=http://ollama:11434
      # Vertex AI経由Gemini（LiteLLM中継、DB内のconnectionsに登録するために必要）
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET:-changeme_please}
    depends_on:
      - ollama
      - litellm
    restart: always
    mem_limit: 512m

  # ================================================================
  # Ollama — ローカルLLM推論（このサーバー上でCPU推論、GPUなし）
  # RAM 7.1GB環境のため小型モデル（3B級Q4量子化）限定
  # ================================================================
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: always
    mem_limit: 3g

  # ================================================================
  # LiteLLM — Vertex AI(Gemini)への中継プロキシ
  # OAuth認証(サービスアカウント)をここに集約し、OpenWebUI/Butler Botには
  # 通常のOpenAI互換APIキーとして見せる
  # ================================================================
  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:main-stable
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./vertex-sa.json:/app/vertex-sa.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex-sa.json
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always
    mem_limit: 1536m

  # ================================================================
  # n8n — ワークフロー自動化（Googleカレンダー連携・通知）
  # アクセス: http://kokko-server-pavilion:5678
  # ================================================================
  n8n:
    container_name: n8n
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - /mnt/data/ai/n8n:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=kokko
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - GENERIC_TIMEZONE=Asia/Tokyo
      - TZ=Asia/Tokyo
      # Google OAuth(Calendar連携)はリダイレクトURIがHTTPS必須＆Public Suffix List基準の
      # ドメイン検証があるため、`tailscale serve --bg 5678`でHTTPS化したTailscale MagicDNSの
      # フルFQDN(443番、パス省略)を使用（詳細: guide/06_n8n設定.md, 09_トラブルシューティング.md）。
      - WEBHOOK_URL=https://kokko-server-pavilion.tailed0412.ts.net/
      - NODE_OPTIONS=--max-old-space-size=768
      # HTTPS無しでアクセスしているため、n8nのSecure Cookie要求を無効化。
      # Tailscale経由のみ許可(08_security.md)で通信路自体は暗号化されているため許容している。
      - N8N_SECURE_COOKIE=false
    restart: always
    mem_limit: 1024m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================================================================
  # Butler Bot — Discord Bot + AIエージェント（自作）
  # 起動: docker compose --profile butler up -d
  # ================================================================
  butler-bot:
    container_name: butler_bot
    build: ./ai
    volumes:
      - /mnt/data/ai/context:/app/context
      # ホスト実行エージェント(scripts/agent_executor.py、systemdでkokkoユーザーとして常駐)との
      # Unixソケット通信用。詳細は plan/11_agent-control.md 参照
      - /mnt/data/ai/agent:/app/agent-socket
      # 3Bot共通のユーザープロフィール/大日程(リポジトリ内の単一ソース。read-only)。
      # 1箇所編集すれば task-agent/執事/ワニ 全部に反映される。
      - ./context/profile.md:/app/profile.md:ro
    env_file: .env
    environment:
      - TZ=Asia/Tokyo
      - AGENT_SOCKET_PATH=/app/agent-socket/butler-agent.sock
      # n8nの「毎朝ブリーフィング_今日の予定取得」ワークフロー(Webhookトリガー)。
      # 同じdocker composeネットワーク上なのでサービス名で到達できる（詳細: guide/06_n8n設定.md）。
      - N8N_TODAY_SCHEDULE_URL=http://n8n:5678/webhook/today-schedule
    restart: unless-stopped
    mem_limit: 256m
    profiles:
      - butler  # APIキー設定後に有効化するため通常起動から除外
    depends_on:
      - n8n
      - wani

  # ================================================================
  # Wani — ワニ博士タスク管理アプリ(自作、plan/13_wani-app.md)
  # PWA(スマホ)配信 + タスク/気分API。タスクの正はGitHub Projects V2で、
  # GITHUB_TOKEN未設定の間はモックデータで動く。
  # スマホからは tailscale serve 経由: https://<MagicDNSのFQDN>:8443/
  # ================================================================
  wani:
    container_name: wani
    build: ./wani
    ports:
      # tailscale serveの中継先。tailnet外に晒さないようloopbackのみにバインド
      - "127.0.0.1:8090:8090"
    # GitHub関連はserver/.envに集約(ユーザー要望で設定ファイルを1つに)。
    # server/.env全体は渡さず、必要な変数だけ${}補間で渡す(compose起動時に
    # このディレクトリの.envから解決される)。未設定ならモックモードで動く
    environment:
      - TZ=Asia/Tokyo
      - DATA_DIR=/app/data
      # 朝の作戦会議のレコメンド(Gemini)用。butler-botと同じLiteLLM経由
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_PROJECT_OWNER=${GITHUB_PROJECT_OWNER:-}
      - GITHUB_PROJECT_OWNER_TYPE=${GITHUB_PROJECT_OWNER_TYPE:-user}
      - GITHUB_PROJECT_NUMBER=${GITHUB_PROJECT_NUMBER:-0}
      - GITHUB_STATUS_FIELD_NAME=${GITHUB_STATUS_FIELD_NAME:-Status}
    volumes:
      - /mnt/data/ai/wani:/app/data
      # 3Bot共通のユーザープロフィール/大日程(リポジトリ内の単一ソース。read-only)
      - ./context/profile.md:/app/profile.md:ro
      # 大日程(major_events)と週次蒸留した学習メモ(learned_prefs.md)を朝の作戦会議の
      # レコメンドに反映するため、task-agentと同じ /mnt/data/ai/context を読む(read-only)
      - /mnt/data/ai/context:/app/context:ro
    restart: unless-stopped
    mem_limit: 256m

  # ================================================================
  # Task Agent — GitHub Project連携のタスク管理エージェント兼思考ログ
  # (plan/12_task-management.md)。常時起動はせず、systemd timer(scripts/systemd/
  # task-agent-*.timer)が1日2回 `docker compose run --rm` する。手動での動作確認:
  #   docker compose --profile task-agent run --rm task-agent-recommend
  #   docker compose --profile task-agent run --rm task-agent-collect
  # ================================================================
  task-agent-recommend:
    container_name: task_agent_recommend
    build: ./task-agent
    command: ["python", "-u", "job_recommend.py"]
    # GitHub/Ollama関連はtask-agent固有の設定としてtask-agent/.envから読む。
    # Discordのトークン・チャンネルはserver/.env（DISCORD_TOKEN_OLLAMA/DISCORD_CHANNEL_OLLAMA、
    # butler-botのDISCORD_TOKEN_BUTLERとは別の専用Bot）から個別に渡す。他の秘密情報
    # (Immich/n8n/restic等)まではコンテナに渡さないため、server/.env全体は読ませていない。
    env_file:
      # GitHub設定はserver/.envに移行済み(下のenvironmentで補間)。このファイルは
      # ローカル直接実行用の名残で、無くてもよい
      - path: ./task-agent/.env
        required: false
    environment:
      - TZ=Asia/Tokyo
      - DISCORD_TOKEN=${DISCORD_TOKEN_OLLAMA}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_OLLAMA}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_PROJECT_OWNER=${GITHUB_PROJECT_OWNER:-}
      - GITHUB_PROJECT_OWNER_TYPE=${GITHUB_PROJECT_OWNER_TYPE:-user}
      - GITHUB_PROJECT_NUMBER=${GITHUB_PROJECT_NUMBER:-0}
      - GITHUB_STATUS_FIELD_NAME=${GITHUB_STATUS_FIELD_NAME:-Status}
    volumes:
      - /mnt/data/ai/task-agent:/app/data
      # 3Bot共通のユーザープロフィール/大日程(リポジトリ内の単一ソース。read-only)
      - ./context/profile.md:/app/profile.md:ro
      # 朝のレコメンドは夜間(4時)にdaily-planが生成した当日プランを読んで投稿する
      # (毎朝Ollamaで作り直さず計算を節約)。read-onlyで参照だけ
      - /mnt/data/ai/wani:/app/wani:ro
    depends_on:
      - ollama
    mem_limit: 256m
    profiles:
      - task-agent

  task-agent-collect:
    container_name: task_agent_collect
    build: ./task-agent
    command: ["python", "-u", "job_collect.py"]
    env_file:
      # GitHub設定はserver/.envに移行済み(下のenvironmentで補間)。このファイルは
      # ローカル直接実行用の名残で、無くてもよい
      - path: ./task-agent/.env
        required: false
    environment:
      - TZ=Asia/Tokyo
      - DISCORD_TOKEN=${DISCORD_TOKEN_OLLAMA}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_OLLAMA}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_PROJECT_OWNER=${GITHUB_PROJECT_OWNER:-}
      - GITHUB_PROJECT_OWNER_TYPE=${GITHUB_PROJECT_OWNER_TYPE:-user}
      - GITHUB_PROJECT_NUMBER=${GITHUB_PROJECT_NUMBER:-0}
      - GITHUB_STATUS_FIELD_NAME=${GITHUB_STATUS_FIELD_NAME:-Status}
    volumes:
      - /mnt/data/ai/task-agent:/app/data
    depends_on:
      - ollama
    mem_limit: 256m
    profiles:
      - task-agent

  task-agent-daily-plan:
    container_name: task_agent_daily_plan
    build: ./task-agent
    command: ["python", "-u", "job_generate_daily_plan.py"]
    env_file:
      - path: ./task-agent/.env
        required: false
    environment:
      - TZ=Asia/Tokyo
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_PROJECT_OWNER=${GITHUB_PROJECT_OWNER:-}
      - GITHUB_PROJECT_OWNER_TYPE=${GITHUB_PROJECT_OWNER_TYPE:-user}
      - GITHUB_PROJECT_NUMBER=${GITHUB_PROJECT_NUMBER:-0}
      - GITHUB_STATUS_FIELD_NAME=${GITHUB_STATUS_FIELD_NAME:-Status}
      # 日次プランの選抜はGemini(LiteLLM)を主経路にする(3Bは指示追従が弱すぎたため)。
      # 未設定ならllm_clientがOllamaにフォールバックする
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000/v1}
      - LLM_MODEL=${WANI_LLM_MODEL:-gemini-2.5-flash-vertex}
    volumes:
      # waniアプリと共有するために、/mnt/data/ai/wani を /app/data にマウント
      - /mnt/data/ai/wani:/app/data
      # 3Bot共通のユーザープロフィール/大日程(リポジリ内の単一ソース。read-only)
      - ./context/profile.md:/app/profile.md:ro
      # major_events(大日程)の読み込み、feedbackログ・learned_prefs.mdの書き込みに使う
      - /mnt/data/ai/context:/app/context
    depends_on:
      - ollama    # Gemini失敗時のフォールバック用
      - litellm   # 主経路(Gemini)
    mem_limit: 256m
    profiles:
      - task-agent

  # 週1で過去のレコメンド実績(feedback/recommend_log.jsonl)を蒸留し、
  # learned_prefs.md を更新する。daily-planとdistill両方がそれを読んでレコメンドに反映する。
  # 手動実行: docker compose --profile task-agent run --rm task-agent-distill
  task-agent-distill:
    container_name: task_agent_distill
    build: ./task-agent
    command: ["python", "-u", "job_distill_prefs.py"]
    env_file:
      - path: ./task-agent/.env
        required: false
    environment:
      - TZ=Asia/Tokyo
      # 完了タスクの分類カテゴリ(未設定なら llm_client._DEFAULT_CATEGORIES を使う)。
      # 変えたいときだけ server/.env に DISTILL_CATEGORIES=院試勉強,研究,... を書く
      - DISTILL_CATEGORIES=${DISTILL_CATEGORIES:-院試勉強,研究,研究室の雑務,アルバイト,ロボコン,趣味,その他}
      # 蒸留もGemini優先(未設定ならOllamaフォールバック)
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000/v1}
      - LLM_MODEL=${WANI_LLM_MODEL:-gemini-2.5-flash-vertex}
    volumes:
      - ./context/profile.md:/app/profile.md:ro
      # feedback/recommend_log.jsonl を読み、learned_prefs.md を書く
      - /mnt/data/ai/context:/app/context
    depends_on:
      - ollama    # Gemini失敗時のフォールバック用
      - litellm   # 主経路(Gemini)
    mem_limit: 256m
    profiles:
      - task-agent

  # ================================================================
  # Uptime Kuma — サービス死活監視（軽量）
  # アクセス: http://kokko-server-pavilion:3001
  # ================================================================
  uptime-kuma:
    container_name: uptime_kuma
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: always
    mem_limit: 256m

  # ================================================================
  # Homepage — 全サービスへのリンク集ダッシュボード
  # アクセス: http://kokko-server-pavilion:3005
  # ================================================================
  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    ports:
      - "3005:3000"
    volumes:
      - ./homepage:/app/config
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=kokko-server-pavilion:3005
    restart: always
    mem_limit: 256m

volumes:
  pgdata:
  model-cache:
  openwebui-data:
  uptime-kuma-data:
  ollama-data:
  navidrome-data:
