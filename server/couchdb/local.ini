; Obsidian LiveSync 用 CouchDB 設定
; 公式ガイド(https://github.com/vrtmrz/obsidian-livesync)推奨のCORS/サイズ設定。
; 管理者ユーザーは docker-compose の COUCHDB_USER/COUCHDB_PASSWORD から作られ、
; CouchDBが別ファイル(local.d/docker.ini)に書くので、このファイルは read-only マウントでよい。

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
max_http_request_size = 4294967296
enable_cors = true
bind_address = 0.0.0.0

[chttpd_auth]
require_valid_user = true

[httpd]
enable_cors = true
WWW-Authenticate = Basic realm="couchdb"

[cors]
credentials = true
; Obsidian(デスクトップ/モバイル)からのアクセスを許可するオリジン
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
