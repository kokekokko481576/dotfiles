[global]
   workgroup = WORKGROUP
   server string = homeserver
   server role = standalone server
   log level = 1
   max log size = 50

   # セキュリティ設定
   security = user
   map to guest = never
   guest ok = no

   # パフォーマンス
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   oplocks = yes
   max xmit = 65535

[data]
   comment = Home Server Data
   path = /data
   valid users = kokko
   read only = no
   browseable = yes
   create mask = 0644
   directory mask = 0755
   force user = kokko
